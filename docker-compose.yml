services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: workmate
      POSTGRES_PASSWORD: workmate
      POSTGRES_DB: workmate_access
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workmate -d workmate_access"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Überschreibt DATABASE_URL aus .env – db ist der Servicename im Docker-Netz
      DATABASE_URL: postgresql://workmate:workmate@db:5432/workmate_access
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
